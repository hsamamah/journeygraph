# src/llm/slices/transfer_impact.yaml
#
# Schema slice for transfer point impact analysis.
#
# Core question: which trips were skipped/cancelled on a given date and which
# transfer opportunities did those interruptions break?
#
# Key traversal: interruptions on a date → affected trips → scheduled
# platforms → other trips scheduled at the same platform (transfer partners).
#
# Park (2023) alignment: multi-hop graph traversal over the static baseline
# (SCHEDULED_AT) overlaid with the Interruption layer.

domain: transfer_impact

# ── Required node labels ──────────────────────────────────────────────────────
# Static structural nodes — always present after base pipeline layers load.
# Checked against db.labels() at startup; strict mode fails if any are absent.
nodes:
  - ":Trip"
  - ":RoutePattern"
  - ":Route"
  - ":Route:Rail"
  - ":Route:Bus"
  - ":Station"
  - ":Platform"
  - ":Date"

# ── Optional node labels ──────────────────────────────────────────────────────
# RT-derived overlay nodes — absent on a fresh DB until the interruption layer
# runs. Never checked against db.labels(). All relationships touching these
# nodes are automatically treated as optional too.
nodes_optional:
  - ":Interruption:Skip"
  - ":Interruption:Cancellation"  # no CANCELED TripUpdates ingested yet

# ── Relationship triples ──────────────────────────────────────────────────────
# Static-to-static relationships always present after base layers load.
# Relationships touching optional nodes are auto-derived as optional.
relationships:
  - { from: "Date",         type: "ON_DATE",      to: "Interruption"  }
  - { from: "Interruption", type: "AFFECTS_TRIP",  to: "Trip"          }
  - { from: "Interruption", type: "AFFECTS_ROUTE", to: "Route"         }
  - { from: "Trip",         type: "SCHEDULED_AT",  to: "Platform"      }
  - { from: "Trip",         type: "FOLLOWS",       to: "RoutePattern"  }
  - { from: "RoutePattern", type: "BELONGS_TO",    to: "Route"         }
  - { from: "Station",      type: "CONTAINS",      to: "Platform"      }

# ── Traversal patterns ────────────────────────────────────────────────────────
patterns:
  - "(:Date)<-[:ON_DATE]-(:Interruption:Skip)-[:AFFECTS_TRIP]->(:Trip)"
  - "(:Date)<-[:ON_DATE]-(:Interruption:Cancellation)-[:AFFECTS_TRIP]->(:Trip)"
  - "(:Trip)-[:SCHEDULED_AT]->(:Platform)<-[:SCHEDULED_AT]-(:Trip)"

# ── WMATA-specific warnings ───────────────────────────────────────────────────
warnings:
  - "WMATA currently produces :Skip interruptions, not :Cancellation — queries for 'cancelled trips' should use :Interruption:Skip"
  - "Transfer partners are found via shared Platform on SCHEDULED_AT, not a TRANSFERS relationship — no transfers.txt in WMATA feed"
  - "Trip has no mode label — traverse FOLLOWS->RoutePattern->BELONGS_TO->:Route:Bus|:Rail to determine mode"
  - "SCHEDULED_AT carries arrival_time and departure_time as relationship properties, not node properties"
  - "date value format is YYYYMMDD string e.g. '20260315' — not a Date type"
