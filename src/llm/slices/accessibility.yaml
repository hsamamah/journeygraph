# src/llm/slices/accessibility.yaml
#
# Schema slice for accessibility-infrastructure correlation analysis.
#
# Core question: which elevator/escalator outages are active at a station,
# and do those outages correlate with service-level disruptions?
#
# Two separate data sources — OutageEvent (WMATA Incidents API) and
# Interruption:Accessibility (GTFS-RT) — are distinct nodes not linked in
# the current schema.
#
# Key traversal: station → pathway nodes → outage events
#
# Park (2023) alignment: indoor-to-outdoor graph connectivity via Pathway nodes.

domain: accessibility

# ── Required node labels ──────────────────────────────────────────────────────
# Static structural nodes — always present after base pipeline layers load.
nodes:
  - ":Pathway"
  - ":Pathway:Elevator"
  - ":Pathway:Escalator"
  - ":Station"
  - ":Level"
  - ":Date"

# ── Optional node labels ──────────────────────────────────────────────────────
# API/RT-derived overlay nodes — absent on a fresh DB until their layer runs.
# All relationships touching these nodes are auto-derived as optional.
nodes_optional:
  - ":OutageEvent"                  # WMATA Incidents API — accessibility layer
  - ":Interruption:Accessibility"   # GTFS-RT ServiceAlerts — no data yet in live feed

# ── Relationship triples ──────────────────────────────────────────────────────
# Static-to-static relationships always present after base layers load.
# Relationships touching optional nodes are auto-derived as optional.
relationships:
  - { from: "Station",     type: "CONTAINS",       to: "Pathway"   }
  - { from: "Pathway",     type: "ON_LEVEL",        to: "Level"     }
  - { from: "Pathway",     type: "STARTING_LEVEL",  to: "Level"     }
  - { from: "Pathway",     type: "ENDING_LEVEL",    to: "Level"     }
  - { from: "OutageEvent", type: "AFFECTS",         to: "Pathway"   }
  - { from: "Interruption",type: "AFFECTS_STOP",    to: "Station"   }
  - { from: "Interruption",type: "ON_DATE",         to: "Date"      }

# ── Traversal patterns ────────────────────────────────────────────────────────
patterns:
  - "(:Station)-[:CONTAINS]->(:Pathway:Elevator)<-[:AFFECTS]-(:OutageEvent)"
  - "(:Station)-[:CONTAINS]->(:Pathway:Elevator)-[:ON_LEVEL]->(:Level)"
  - "(:Station)-[:CONTAINS]->(:Pathway:Escalator)-[:STARTING_LEVEL]->(:Level)"
  - "(:Station)<-[:AFFECTS_STOP]-(:Interruption:Accessibility)-[:ON_DATE]->(:Date)"

# ── WMATA-specific warnings ───────────────────────────────────────────────────
warnings:
  - "Prefer multi-label (:Pathway:Elevator, :Pathway:Escalator) over node_type property for filtering — multi-label is indexed"
  - "OutageEvent identity key is composite: unit_name + date_out_of_service — do not filter on unit_name alone"
  - "OutageEvent (WMATA Incidents API) and Interruption:Accessibility (GTFS-RT) are separate node types from separate sources — they are not linked in the current schema"
  - "level_index on :Level: 0=street level, negative=underground, positive=above ground"
  - "Elevators carry ON_LEVEL to every Level in their traversed range (range derivation) — an elevator between L0 and L2 will have ON_LEVEL to L0, L1, and L2"
  - "Escalators carry STARTING_LEVEL (from_stop) and ENDING_LEVEL (to_stop) — direction of travel is encoded in the relationship type, not a property"
  - "Use level_name on :Level for human-readable floor descriptions; use level_index for numeric comparisons (e.g. underground = negative index)"
