# src/llm/slices/accessibility.yaml
#
# Schema slice for accessibility-infrastructure correlation analysis.
#
# Core question: which elevator/escalator outages are active at a station,
# and do those outages correlate with service-level disruptions at the
# same station?
#
# Two separate data sources — OutageEvent (WMATA Incidents API,  Accessibility layer)
# and Interruption:Accessibility (GTFS-RT, Interruption layer) — are distinct
# nodes. They may describe the same physical event but are not linked in the
# current schema. See schema audit issue #2 in service_interruption_schema_v3.
#
# Key traversal: station → elevator/escalator pathway nodes → outage events
# AND station → accessibility interruptions → date.
#
# Park (2023) alignment: indoor-to-outdoor graph connectivity via Pathway nodes.
# This is the direct implementation of Park's future work on indoor-outdoor
# graph integration — JourneyGraph's primary academic contribution.
#
# NOTE: OutageEvent nodes are part of Accessibility layer and may not
# be present in the live graph if that layer has not been loaded. In default
# mode this produces a startup warning. In strict mode it raises.

domain: accessibility

# ── Node label whitelist ──────────────────────────────────────────────────────
# :Pathway:Elevator and :Pathway:Escalator use the v3 naming.
# :Pathway was renamed to :Pathway in schema v3. See CONVENTIONS.md.
nodes:
  - ":Pathway"
  - ":Pathway:Elevator"
  - ":Pathway:Escalator"
  - ":Station"
  - ":OutageEvent"
  - ":Date"
  - ":Level"
  # NOTE: :Interruption:Accessibility is intentionally excluded from this
  # whitelist. The label is valid schema (created from GTFS-RT ServiceAlerts
  # with effect=ACCESSIBILITY_ISSUE) but no such alerts exist in the current
  # live feed, so the label is never present in the graph. Re-add when
  # WMATA begins publishing ACCESSIBILITY_ISSUE alerts.

# ── Relationship triples ──────────────────────────────────────────────────────
relationships:
  - { from: "Station",              type: "CONTAINS",         to: "Pathway"   }
  - { from: "OutageEvent",          type: "AFFECTS",          to: "Pathway"   }
  - { from: "Pathway",              type: "ON_LEVEL",         to: "Level"     }
  - { from: "Pathway",              type: "STARTING_LEVEL",   to: "Level"     }
  - { from: "Pathway",              type: "ENDING_LEVEL",     to: "Level"     }
  # NOTE: Interruption -[:AFFECTS_STOP]-> Station and -[:ON_DATE]-> Date are
  # excluded — they depend on :Interruption:Accessibility which is absent from
  # the live graph. Re-add alongside the node label when data is available.

# ── Traversal patterns ────────────────────────────────────────────────────────
# Minimum 3-hop expansion required for accessibility queries.
patterns:
  - "(:Station)-[:CONTAINS]->(:Pathway:Elevator)<-[:AFFECTS]-(:OutageEvent)"
  - "(:Station)-[:CONTAINS]->(:Pathway:Elevator)-[:ON_LEVEL]->(:Level)"
  - "(:Station)-[:CONTAINS]->(:Pathway:Escalator)-[:STARTING_LEVEL]->(:Level)"
  # NOTE: (:Station)<-[:AFFECTS_STOP]-(:Interruption:Accessibility)-[:ON_DATE]->(:Date)
  # excluded — depends on absent live data. Re-add when data is available.

# ── WMATA-specific warnings ───────────────────────────────────────────────────
warnings:
  - "Prefer multi-label (:Pathway:Elevator, :Pathway:Escalator) over node_type property for filtering — multi-label is indexed"
  - "OutageEvent identity key is composite: unit_name + date_out_of_service — do not filter on unit_name alone"
  - "OutageEvent (WMATA Incidents API) and Interruption:Accessibility (GTFS-RT) are separate node types from separate sources — they are not linked in the current schema"
  - "level_index on :Level: 0=street level, negative=underground, positive=above ground"
  - "Elevators carry ON_LEVEL to every Level in their traversed range (range derivation) — an elevator between L0 and L2 will have ON_LEVEL to L0, L1, and L2"
  - "Escalators carry STARTING_LEVEL (from_stop) and ENDING_LEVEL (to_stop) — direction of travel is encoded in the relationship type, not a property"
  - "Use level_name on :Level for human-readable floor descriptions; use level_index for numeric comparisons (e.g. underground = negative index)"
