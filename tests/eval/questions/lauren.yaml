- id: lauren_029
  question: Which pairs of stations serve the most similar set of metro lines?
  domain: transfer_impact
  anchors: []
  anchor_complexity: single
  query_mode: text2cypher
  hop_depth: deep
  temporal: null
  category: happy_path
  oracle_cypher: "CALL gds.graph.project.cypher(\n  'tmpLauren029',\n  'MATCH (s:Station) RETURN id(s)\
    \ AS id, labels(s) AS labels',\n  'MATCH (s1:Station)-[:SERVES*1..2]-(r)-[:SERVES*1..2]-(s2:Station)\
    \ \n   WHERE id(s1) < id(s2) AND (r:Route OR r:Line)\n   RETURN id(s1) AS source, id(s2) AS target,\
    \ \"VIRTUAL_TRANSFER\" AS type'\n) YIELD graphName\nCALL gds.nodeSimilarity.stream(graphName)\nYIELD\
    \ node1, node2, similarity\nRETURN \n    gds.util.asNode(node1).name AS station_a, \n    gds.util.asNode(node2).name\
    \ AS station_b, \n    round(similarity, 4) AS route_similarity_score\nORDER BY route_similarity_score\
    \ DESC\nLIMIT 15"
  ground_truth: A correct answer must identify Farragut West and McPherson Sq as the pair of stations
    serving the most similar set of metro lines, with a route similarity score of 0.98. The answer should
    acknowledge that this represents the highest similarity score among all paired comparisons in the
    data. The answer may also note that several other station pairs exhibit similarly high scores (such
    as Foggy Bottom-GWU and Farragut West at 0.9796, or Foggy Bottom-GWU and Rosslyn at 0.9792), but must
    recognize Farragut West and McPherson Sq as the primary answer to the question posed.
  notes: 'Node similarity (Jaccard) on the Route-Station bipartite graph. Tests that the Planner sets
    use_gds=true for "similar" phrasing and that the QueryWriter generates the correct GDS projection
    + stream chain.

    '
- id: lauren_030
  question: Which stations form the most tightly connected interchange clusters?
  domain: transfer_impact
  anchors: []
  anchor_complexity: single
  query_mode: text2cypher
  hop_depth: deep
  temporal: null
  category: happy_path
  oracle_cypher: "CALL gds.graph.project.cypher(\n  'tmpLauren030',\n  'MATCH (s:Station) RETURN id(s)\
    \ AS id, labels(s) AS labels',\n  'MATCH (s1:Station)-[:SERVES*1..2]-(r)-[:SERVES*1..2]-(s2:Station)\
    \ \n   WHERE id(s1) < id(s2) AND (r:Route OR r:Line)\n   RETURN id(s1) AS source, id(s2) AS target,\
    \ \"VIRTUAL_TRANSFER\" AS type'\n) YIELD graphName\nCALL gds.betweenness.stream(graphName)\nYIELD\
    \ nodeId, score\nRETURN \n    gds.util.asNode(nodeId).name AS station, \n    round(score, 2) AS centrality_score\n\
    ORDER BY centrality_score DESC\nLIMIT 15"
  ground_truth: A correct answer must identify L'Enfant Plaza and Fort Totten as forming the most tightly
    connected interchange clusters, with centrality scores of 791.06 and 729.0 respectively, indicating
    they are the primary hub stations with the highest network connectivity. The answer should recognize
    that Gallery Place (465.0) ranks third in centrality but significantly below the top two stations.
    A correct answer must not suggest that stations with equal centrality scores of 33.37 (Braddock Rd,
    Ronald Reagan Washington National Airport, King St-Old Town, Pentagon, Potomac Yard, Pentagon City,
    and Crystal City) or 17.09 (Federal Center SW, Federal Triangle, Smithsonian, Capitol South, and Eastern
    Market) form the most tightly connected clusters, as their lower scores indicate peripheral rather
    than central positions in the interchange network.
  notes: 'Triangle count — stations in tightly knit interchange clusters. Tests that "tightly connected"
    phrasing routes to triangleCount, not betweenness or PageRank.

    '
- id: lauren_031
  question: What is the shortest path from Shady Grove to Anacostia?
  domain: transfer_impact
  anchors:
  - Shady Grove
  - Anacostia
  anchor_complexity: multi
  query_mode: text2cypher
  hop_depth: deep
  temporal: null
  category: happy_path
  oracle_cypher: "CALL gds.graph.project('tmpLauren031', ['Station', 'Route'],\n  {SERVES: {type: 'SERVES',\
    \ orientation: 'UNDIRECTED'}})\nYIELD graphName\nMATCH (source:Station {id: 'STN_A15'}), (target:Station\
    \ {id: 'STN_F06'})\nCALL gds.shortestPath.dijkstra.stream(graphName, {sourceNode: source, targetNode:\
    \ target})\nYIELD nodeIds, totalCost\nRETURN\n    source.name AS origin,\n    target.name AS destination,\n\
    \    [nodeId IN nodeIds | gds.util.asNode(nodeId).name] AS path_nodes,\n    toInteger(totalCost) AS\
    \ hop_count\nORDER BY hop_count ASC\nLIMIT 1\n"
  ground_truth: A correct answer must state that the shortest path from Shady Grove to Anacostia requires
    4 hops and includes the stations Shady Grove, Fort Totten, and Anacostia. The data contains two null
    values in the path_nodes array representing intermediate stations that are not specified in the available
    data, so a correct answer should acknowledge these missing intermediate stations or note that the
    complete station sequence is not fully detailed while still providing the hop count and named stations
    that are available.
  notes: 'Multi-anchor Dijkstra shortest path — Shady Grove (Red Line end, STN_A15) to Anacostia (Green
    Line, STN_F06). Requires transfer at a shared station (likely Fort Totten). Tests multi-anchor ID
    resolution and GDS path stitching.

    '
- id: lauren_032
  question: How does Fort Totten rank in terms of importance as a transfer hub compared to all other stations?
  domain: transfer_impact
  anchors:
  - Fort Totten
  anchor_complexity: single
  query_mode: text2cypher
  hop_depth: shallow
  temporal: null
  category: happy_path
  oracle_cypher: "CALL gds.graph.project('tmpLauren032', ['Station', 'Route'],\n  {SERVES: {type: 'SERVES',\
    \ orientation: 'UNDIRECTED'}})\nYIELD graphName\nCALL gds.pageRank.stream(graphName)\nYIELD nodeId,\
    \ score\nWITH gds.util.asNode(nodeId) AS node, score\nWHERE node:Station\nWITH node, score ORDER BY\
    \ score DESC\nWITH collect({name: node.name, score: score}) AS ranked\nUNWIND range(0, size(ranked)-1)\
    \ AS idx\nWITH ranked[idx] AS entry, idx+1 AS position, size(ranked) AS total\nWHERE entry.name =\
    \ 'Fort Totten'\nRETURN entry.name AS station_name, round(entry.score, 4) AS pagerank_score,\n   \
    \    position AS rank_position, total AS total_stations\n"
  ground_truth: Fort Totten ranks 4th in importance as a transfer hub among all 98 stations in the system,
    with a PageRank score of 0.9666. A correct answer must specify both the rank position (4th) and note
    that this reflects its relative importance compared to the other 97 stations. The answer should not
    speculate about the reasons for this ranking or make claims about specific routes or transfer volumes
    beyond what the PageRank metric itself indicates.
  notes: 'Anchor-specific PageRank ranking — tests that the pipeline can answer a station-specific centrality
    question. Fort Totten is a known high-ranking interchange (Red/Green/Yellow).

    '
- id: lauren_033
  question: Which stations can I reach from Gallery Place within one transfer?
  domain: transfer_impact
  anchors:
  - Gallery Place
  anchor_complexity: single
  query_mode: text2cypher
  hop_depth: deep
  temporal: null
  category: happy_path
  oracle_cypher: "CALL gds.graph.project('tmpLauren033', ['Station', 'Route'],\n  {SERVES: {type: 'SERVES',\
    \ orientation: 'UNDIRECTED'}})\nYIELD graphName\nMATCH (source:Station {id: 'STN_B01_F01'})\nCALL\
    \ gds.bfs.stream(graphName, {sourceNode: source, maxDepth: 2})\nYIELD path\nUNWIND nodes(path) AS\
    \ n\nWITH DISTINCT n\nWHERE n:Station AND n.id <> 'STN_B01_F01'\nRETURN n.name AS reachable_station,\
    \ n.id AS station_id\nORDER BY reachable_station\n"
  ground_truth: 'A correct answer must identify exactly 20 stations reachable from Gallery Place within
    one transfer: Anacostia, Archives, Bethesda, Braddock Rd, Branch Av, Brookland-CUA, Cleveland Park,
    College Park-U of Md, Columbia Heights, Congress Heights, Crystal City, Dupont Circle, Eisenhower
    Av, Farragut North, Forest Glen, Fort Totten, Friendship Heights, Georgia Av-Petworth, Glenmont, and
    Greenbelt. The answer must list these stations by name and must not omit any of the 20 stations explicitly
    provided in the data.'
  notes: 'BFS reachability from Gallery Place (STN_B01_F01 — Green/Yellow/Red interchange). maxDepth:2
    in bipartite = one transfer. Tests anchor injection into GDS sourceNode parameter.

    '
