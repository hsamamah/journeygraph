- id: lauren_029
  question: Which pairs of stations serve the most similar set of metro lines?
  domain: transfer_impact
  anchors: []
  anchor_complexity: single
  query_mode: text2cypher
  hop_depth: deep
  temporal: null
  category: happy_path
  oracle_cypher: "CALL gds.graph.project('tmpLauren029', ['Station', 'Route'],\n  {SERVES: {type: 'SERVES',\
    \ orientation: 'NATURAL'}})\nYIELD graphName\nCALL gds.nodeSimilarity.stream(graphName)\nYIELD node1,\
    \ node2, similarity\nWITH gds.util.asNode(node1) AS a, gds.util.asNode(node2) AS b, similarity\nWHERE\
    \ a:Station AND b:Station\nRETURN\n    a.name               AS station_a,\n    b.name            \
    \   AS station_b,\n    round(similarity, 4) AS route_similarity_score\nORDER BY route_similarity_score\
    \ DESC\nLIMIT 15\n"
  ground_truth: ''
  notes: 'Node similarity (Jaccard) on the Route-Station bipartite graph. Tests that the Planner sets
    use_gds=true for "similar" phrasing and that the QueryWriter generates the correct GDS projection
    + stream chain.

    '
