- id: lauren_008
  question: Show me the trip update provenance for delays on the D80 route.
  domain: delay_propagation
  anchors:
  - D80
  anchor_complexity: single
  query_mode: subgraph
  hop_depth: deep
  temporal: implicit
  category: happy_path
  oracle_cypher: "MATCH (i:Interruption:Delay)-[:AFFECTS_ROUTE]->(r:Route)\nWHERE r.route_short_name =\
    \ 'D80'\nMATCH (i)-[:SOURCED_FROM]->(tu:TripUpdate)\nMATCH (tu)-[:HAS_STOP_UPDATE]->(stu:StopTimeUpdate)\n\
    RETURN\n  tu.trip_id          AS trip_id,\n  tu.delay            AS delay_seconds,\n  tu.source  \
    \         AS source,\n  stu.stop_id         AS stop_id,\n  stu.arrival_delay   AS arrival_delay_s,\n\
    \  stu.departure_delay AS departure_delay_s\nORDER BY tu.delay DESC\nLIMIT 20\n"
  ground_truth: 'A correct answer must identify that trip updates for the D80 route delays come from the
    GTFS real-time bus data source (gtfs_rt_bus). The answer should convey that at least two trips are
    documented with delays: trip 32613040 with a 768-second delay across 13 stops, and trip 35220040 with
    a 577-second delay across 7 stops shown in the results. The provenance is consistently attributed
    to GTFS real-time bus updates, and a correct answer should not speculate about the causes of these
    delays or make inferences beyond what the data explicitly shows.'
  notes: 'Deep provenance traversal — Interruption → SOURCED_FROM → TripUpdate → HAS_STOP_UPDATE → StopTimeUpdate.
    Tests the full provenance chain for LLM explainability. D80 (Wisconsin Av) has 5 TripUpdates.

    '
