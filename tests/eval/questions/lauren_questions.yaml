- id: lauren_031
  question: What is the shortest path from Shady Grove to Anacostia?
  domain: transfer_impact
  anchors:
  - Shady Grove
  - Anacostia
  anchor_complexity: multi
  query_mode: text2cypher
  hop_depth: deep
  temporal: null
  category: happy_path
  oracle_cypher: "CALL gds.graph.project('tmpLauren031', ['Station', 'Route'],\n  {SERVES: {type: 'SERVES',\
    \ orientation: 'UNDIRECTED'}})\nYIELD graphName\nMATCH (source:Station {id: 'STN_A15'}), (target:Station\
    \ {id: 'STN_F06'})\nCALL gds.shortestPath.dijkstra.stream(graphName, {sourceNode: source, targetNode:\
    \ target})\nYIELD nodeIds, totalCost\nRETURN\n    source.name AS origin,\n    target.name AS destination,\n\
    \    [nodeId IN nodeIds | gds.util.asNode(nodeId).name] AS path_nodes,\n    toInteger(totalCost) AS\
    \ hop_count\nORDER BY hop_count ASC\nLIMIT 1\n"
  ground_truth: ''
  notes: 'Multi-anchor Dijkstra shortest path — Shady Grove (Red Line end, STN_A15) to Anacostia (Green
    Line, STN_F06). Requires transfer at a shared station (likely Fort Totten). Tests multi-anchor ID
    resolution and GDS path stitching.

    '
- id: lauren_032
  question: How does Fort Totten rank in terms of importance as a transfer hub compared to all other stations?
  domain: transfer_impact
  anchors:
  - Fort Totten
  anchor_complexity: single
  query_mode: text2cypher
  hop_depth: shallow
  temporal: null
  category: happy_path
  oracle_cypher: "CALL gds.graph.project('tmpLauren032', ['Station', 'Route'],\n  {SERVES: {type: 'SERVES',\
    \ orientation: 'UNDIRECTED'}})\nYIELD graphName\nCALL gds.pageRank.stream(graphName)\nYIELD nodeId,\
    \ score\nWITH gds.util.asNode(nodeId) AS node, score\nWHERE node:Station\nWITH node, score ORDER BY\
    \ score DESC\nWITH collect({name: node.name, score: score}) AS ranked\nUNWIND range(0, size(ranked)-1)\
    \ AS idx\nWITH ranked[idx] AS entry, idx+1 AS position, size(ranked) AS total\nWHERE entry.name =\
    \ 'Fort Totten'\nRETURN entry.name AS station_name, round(entry.score, 4) AS pagerank_score,\n   \
    \    position AS rank_position, total AS total_stations\n"
  ground_truth: ''
  notes: 'Anchor-specific PageRank ranking — tests that the pipeline can answer a station-specific centrality
    question. Fort Totten is a known high-ranking interchange (Red/Green/Yellow).

    '
- id: lauren_033
  question: Which stations can I reach from Gallery Place within one transfer?
  domain: transfer_impact
  anchors:
  - Gallery Place
  anchor_complexity: single
  query_mode: text2cypher
  hop_depth: deep
  temporal: null
  category: happy_path
  oracle_cypher: "CALL gds.graph.project('tmpLauren033', ['Station', 'Route'],\n  {SERVES: {type: 'SERVES',\
    \ orientation: 'UNDIRECTED'}})\nYIELD graphName\nMATCH (source:Station {id: 'STN_B01_F01'})\nCALL\
    \ gds.bfs.stream(graphName, {sourceNode: source, maxDepth: 2})\nYIELD path\nUNWIND nodes(path) AS\
    \ n\nWITH DISTINCT n\nWHERE n:Station AND n.id <> 'STN_B01_F01'\nRETURN n.name AS reachable_station,\
    \ n.id AS station_id\nORDER BY reachable_station\n"
  ground_truth: ''
  notes: 'BFS reachability from Gallery Place (STN_B01_F01 — Green/Yellow/Red interchange). maxDepth:2
    in bipartite = one transfer. Tests anchor injection into GDS sourceNode parameter.

    '
