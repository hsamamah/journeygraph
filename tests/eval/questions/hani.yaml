- id: hani_010
  question: Are there any elevator outages at Metro Center, and were there any service disruptions at
    the same station recently?
  domain: accessibility
  anchors:
  - Metro Center
  anchor_complexity: single
  query_mode: both
  hop_depth: deep
  temporal: implicit
  category: edge_case
  oracle_cypher: "MATCH (s:Station)-[:CONTAINS]->(e:Pathway:Elevator)\nWHERE s.name CONTAINS 'Metro Center'\n\
    OPTIONAL MATCH (o:OutageEvent)-[:AFFECTS]->(e)\nOPTIONAL MATCH (i:Interruption)-[:AFFECTS_ROUTE]->(r:Route)-[:SERVES]->(s)\n\
    RETURN s.name AS station,\n       count(DISTINCT o) AS active_outages,\n       count(DISTINCT i) AS\
    \ route_disruptions\n"
  ground_truth: A correct answer must state that there are currently no active elevator outages at Metro
    Center station. The answer must also convey that there are five active route disruptions at the station.
    A correct answer should address both parts of the question—elevator outages and service disruptions—while
    keeping these as separate facts and not implying any connection between them.
  notes: 'Stress-tests the schema gap: OutageEvent (WMATA Incidents API) and Interruption (GTFS-RT) are
    separate sources with no direct link. The LLM must present both independently without implying causation.'
