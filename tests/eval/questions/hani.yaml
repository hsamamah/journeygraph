- id: hani_012
  question: Is the elevator at Galery Place even working rn?
  domain: accessibility
  anchors:
  - Galery Place
  anchor_complexity: single
  query_mode: subgraph
  hop_depth: shallow
  temporal: implicit
  category: noise
  noise_type: colloquial
  oracle_cypher: "MATCH (s:Station)-[:CONTAINS]->(e:Pathway:Elevator)\nWHERE s.name CONTAINS 'Gallery\
    \ Place'\nOPTIONAL MATCH (o:OutageEvent)-[:AFFECTS]->(e)\nRETURN s.name AS station, e.id AS elevator_id,\n\
    \       e.from_stop_desc AS from_desc, e.to_stop_desc AS to_desc,\n       o.unit_name AS outage_unit,\
    \ o.status AS status,\n       o.estimated_return AS eta\nORDER BY o.date_updated DESC\n"
  ground_truth: A correct answer must acknowledge that the query returned elevator information for Gallery
    Place station, but the oracle data does not contain status information that would allow a definitive
    answer about whether the elevators are currently working. The three elevators listed (B01_F01_119167,
    B01_F01_119143, and B01_F01_119138) all have null values for status, outage_unit, and eta fields,
    meaning the real-time operational status cannot be determined from the available data. A correct response
    should not speculate about whether the elevators are working or provide made-up status information.
  notes: Colloquial + typo noise variant of hani_003. "Galery Place" (missing l) + "rn" (right now) tests
    both AnchorResolver fuzzy matching and narration agent handling of informal register.
- id: hani_013
  question: Any bus delays downtown right now?
  domain: delay_propagation
  anchors: []
  anchor_complexity: single
  query_mode: subgraph
  hop_depth: shallow
  temporal: implicit
  category: noise
  noise_type: underspecified
  oracle_cypher: 'MATCH (i:Interruption:Delay)-[:AFFECTS_ROUTE]->(r:Route:Bus)

    RETURN r.route_short_name AS route, count(i) AS active_delays

    ORDER BY active_delays DESC

    LIMIT 5

    '
  ground_truth: 'A correct answer must indicate that there are currently bus delays affecting downtown
    routes, and should specify the five routes experiencing delays: D80 (31 minutes), C53 (28 minutes),
    D40 (21 minutes), C21 (20 minutes), and D20 (20 minutes). The answer should present these as current
    active delays without speculating about causes or providing information beyond what the data shows.'
  notes: Under-specified anchor noise variant of hani_004. "Downtown" is not a resolvable WMATA station
    or route name. Tests whether the system fails gracefully, asks for clarification, or hallucinates
    a location anchor. No specific station is resolvable from this query.
