- id: hani_013
  question: Any bus delays downtown right now?
  domain: delay_propagation
  anchors: []
  anchor_complexity: single
  query_mode: subgraph
  hop_depth: shallow
  temporal: implicit
  category: noise
  noise_type: underspecified
  oracle_cypher: 'MATCH (i:Interruption:Delay)-[:AFFECTS_ROUTE]->(r:Route:Bus)

    RETURN r.route_short_name AS route, count(i) AS active_delays

    ORDER BY active_delays DESC

    LIMIT 5

    '
  ground_truth: 'A correct answer must specify that there are currently bus delays affecting five downtown
    routes: D80 with 321 active delays, F20 with 282 active delays, C53 with 270 active delays, D40 with
    249 active delays, and D20 with 228 active delays. The answer should convey that delays are occurring
    across multiple routes with these exact delay counts and should not speculate about causes or severity
    beyond what the data indicates.'
  notes: Under-specified anchor noise variant of hani_004. "Downtown" is not a resolvable WMATA station
    or route name. Tests whether the system fails gracefully, asks for clarification, or hallucinates
    a location anchor. No specific station is resolvable from this query.
