- id: hani_001
  question: How many Yellow Line trips were skipped most recently?
  domain: transfer_impact
  anchors:
  - Yellow Line
  anchor_complexity: single
  query_mode: text2cypher
  hop_depth: shallow
  temporal: implicit
  category: happy_path
  oracle_cypher: 'MATCH (d:Date)<-[:ON_DATE]-(i:Interruption:Skip)-[:AFFECTS_ROUTE]->(r:Route:Rail)

    WHERE r.route_short_name = ''Y''

    WITH d ORDER BY d.date DESC LIMIT 1

    MATCH (d)<-[:ON_DATE]-(i:Interruption:Skip)-[:AFFECTS_ROUTE]->(r:Route:Rail)

    WHERE r.route_short_name = ''Y''

    RETURN count(i) AS skipped_trips, d.date AS date

    '
  ground_truth: A correct answer must state that 27 Yellow Line trips were skipped most recently, based
    on the data from April 15, 2026. The answer should include this exact numerical count and may reference
    the date as context for what "most recently" means. The answer must not speculate about reasons for
    the skipped trips or provide information beyond what is present in the data.
  notes: Baseline precision test. Single anchor, implicit date. Yellow Line chosen because it has Skip
    data in the live graph. Should produce a single numeric answer via Cypher.
- id: hani_002
  question: Which bus routes near Metro Center have had trips skipped most recently?
  domain: transfer_impact
  anchors:
  - Metro Center
  anchor_complexity: single
  query_mode: both
  hop_depth: deep
  temporal: implicit
  category: happy_path
  oracle_cypher: "MATCH (d:Date)<-[:ON_DATE]-(i:Interruption:Skip)-[:AFFECTS_ROUTE]->(r:Route:Bus)\nWITH\
    \ d ORDER BY d.date DESC LIMIT 1\nMATCH (d)<-[:ON_DATE]-(i:Interruption:Skip)-[:AFFECTS_ROUTE]->(r:Route:Bus)\n\
    RETURN r.route_short_name AS route, r.route_long_name AS name,\n       count(i) AS skipped_trips,\
    \ d.date AS date\nORDER BY skipped_trips DESC\nLIMIT 10\n"
  ground_truth: 'As of April 15, 2026, the bus routes near Metro Center with the most recently recorded
    skipped trips are, in descending order: C81 (Military Rd) with 460 skipped trips, D96 (Massachusetts
    Av-Bethesda) with 402 skipped trips, C37 (Lincoln Hts-Potomac Av) and D94 (Gallery Place-Sibley Hospital)
    each with 351 skipped trips, C91 (LeDroit Park-Georgetown) with 240 skipped trips, C41 (Bladensburg
    Rd) with 118 skipped trips, D40 (7 St-Georgia Av) with 111 skipped trips, M70 (East West Hwy) with
    106 skipped trips, D10 (Pennsylvania Av) with 85 skipped trips, and A49 (Columbia Pike-Metro Center)
    with 51 skipped trips. A correct answer must include the specific routes and their exact skipped trip
    counts, and should rank them by frequency of skipped trips from highest to lowest.'
  notes: Tests disruption summary for a station anchor. Bus trip joins confirmed via AFFECTS_ROUTE. Simplified
    from transfer partner traversal because bus trips use BusStop not Platform, making platform-level
    partner joins unavailable.
- id: hani_003
  question: Is the elevator at Gallery Place working right now?
  domain: accessibility
  anchors:
  - Gallery Place
  anchor_complexity: single
  query_mode: subgraph
  hop_depth: shallow
  temporal: implicit
  category: happy_path
  oracle_cypher: "MATCH (s:Station)-[:CONTAINS]->(e:Pathway:Elevator)\nWHERE s.name CONTAINS 'Gallery\
    \ Place'\nOPTIONAL MATCH (o:OutageEvent)-[:AFFECTS]->(e)\nRETURN s.name AS station, e.id AS elevator_id,\n\
    \       e.from_stop_desc AS from_desc, e.to_stop_desc AS to_desc,\n       o.unit_name AS outage_unit,\
    \ o.status AS status,\n       o.estimated_return AS eta\nORDER BY o.date_updated DESC\n"
  ground_truth: Gallery Place has three elevators. Two of them (B01_F01_119167 and B01_F01_119143, which
    operate between the Lower Mezzanine and Platform) are operational with no reported issues. The third
    elevator (B01_F01_119138, which operates between Street and Platform) had a previous outage that has
    been resolved and is now operational. A correct answer must convey that the elevators at Gallery Place
    are working.
  notes: Most common real-world accessibility question. Tests OutageEvent retrieval via AFFECTS → Pathway:Elevator
    joined through Station CONTAINS.
- id: hani_004
  question: Are there any active delays on the Wisconsin Ave bus corridor right now?
  domain: delay_propagation
  anchors:
  - Wisconsin Ave
  anchor_complexity: single
  query_mode: subgraph
  hop_depth: shallow
  temporal: implicit
  category: happy_path
  oracle_cypher: "MATCH (i:Interruption:Delay)-[:AFFECTS_ROUTE]->(r:Route:Bus)\nWHERE r.route_short_name\
    \ = 'D80'\nRETURN i.interruption_id AS delay_id, i.severity AS severity,\n       i.start_time AS started,\
    \ i.description AS description\nORDER BY i.start_time DESC\nLIMIT 10\n"
  ground_truth: Yes, there are active delays on the Wisconsin Ave bus corridor. The data shows 10 active
    delay incidents, all with WARNING severity. Six trips (11215080, 33671080, 9192080, 14636080, 3037080,
    and 2022080) have recent delays ranging from 332 to 713 seconds, while four additional trips (11440080,
    26065080, 22420080, and 30647080) show delays ranging from 310 to 676 seconds. A correct answer must
    acknowledge the presence of these delays and may include the specific trip IDs and delay durations
    if providing detailed information.
  notes: Delay query on the D80 (Wisconsin Av-Union Station) — highest-delay bus route in current data.
    No rail delays exist in live graph. Tests AFFECTS_ROUTE traversal.
- id: hani_005
  question: Which bus trips have been delayed most recently and how severe were the delays?
  domain: delay_propagation
  anchors: []
  anchor_complexity: single
  query_mode: both
  hop_depth: deep
  temporal: implicit
  category: happy_path
  oracle_cypher: "MATCH (d:Date)<-[:ON_DATE]-(i:Interruption:Delay)-[:AFFECTS_TRIP]->(t:Trip)\nWITH d\
    \ ORDER BY d.date DESC LIMIT 1\nMATCH (d)<-[:ON_DATE]-(i:Interruption:Delay)-[:AFFECTS_TRIP]->(t:Trip)\n\
    \      -[:FOLLOWS]->(rp:RoutePattern)-[:BELONGS_TO]->(r:Route)\nRETURN i.severity AS severity, r.route_short_name\
    \ AS route,\n       count(DISTINCT t) AS affected_trips, d.date AS date\nORDER BY affected_trips DESC\n\
    LIMIT 10\n"
  ground_truth: The most recent bus trip delays occurred on April 15, 2026, affecting 10 routes with WARNING
    severity levels. Routes D80 and D10 were most severely impacted with 6 affected trips each, followed
    by routes D20, F20, C51, and C53 with 4 affected trips each, and routes M44, F1X, D96, and D60 with
    3 affected trips each, for a total of 40 affected trips across all listed routes. A correct answer
    must specify these exact route names, trip counts, and the April 15, 2026 date, and must characterize
    the severity as WARNING level delays rather than using vague severity descriptors.
  notes: No-anchor delay summary. Tests AFFECTS_TRIP deep traversal through Trip → RoutePattern → Route.
    Provenance path (SOURCED_FROM) also exercised by narration agent.
- id: hani_006
  question: Which escalators at Pentagon City connect the street level to the platform level?
  domain: accessibility
  anchors:
  - Pentagon City
  anchor_complexity: single
  query_mode: subgraph
  hop_depth: deep
  temporal: implicit
  category: happy_path
  oracle_cypher: "MATCH (s:Station)-[:CONTAINS]->(e:Pathway:Escalator)\nWHERE s.name CONTAINS 'Pentagon\
    \ City'\nMATCH (e)-[:STARTING_LEVEL]->(sl:Level)\nMATCH (e)-[:ENDING_LEVEL]->(el:Level)\nRETURN e.id\
    \ AS escalator_id,\n       e.from_stop_desc AS from_desc, e.to_stop_desc AS to_desc,\n       sl.level_name\
    \ AS from_level, sl.level_index AS from_index,\n       el.level_name AS to_level,   el.level_index\
    \ AS to_index\nORDER BY sl.level_index\n"
  ground_truth: No escalators at Pentagon City connect the street level directly to the platform level.
    The data shows 6 escalators (C08_137144, C08_137135, C08_137141, C08_137138, C08_137132, and C08_137129)
    at this station, but all of them connect between the Mezzanine level and the Platform level only.
    A correct answer must clarify that there are no street-to-platform escalators in the provided data
    and should not imply the existence of such connections.
  notes: Tests level-aware traversal. Requires STARTING_LEVEL and ENDING_LEVEL resolution. Validates level_index
    is used correctly (0=street, negative=underground).
- id: hani_007
  question: What disruptions are there at Washington?
  domain: delay_propagation
  anchors:
  - Washington
  anchor_complexity: ambiguous
  query_mode: subgraph
  hop_depth: shallow
  temporal: implicit
  category: edge_case
  oracle_cypher: 'MATCH (s:Station) WHERE s.name CONTAINS ''Washington''

    OPTIONAL MATCH (i:Interruption)-[:AFFECTS_ROUTE]->(r:Route)-[:SERVES]->(s)

    RETURN s.name AS station, s.id AS station_id, count(DISTINCT i) AS disruption_count

    ORDER BY s.name

    '
  ground_truth: 'A correct answer must identify the two Washington-area stations with disruptions: Ronald
    Reagan Washington National Airport with 387 disruptions and Washington Dulles International Airport
    with 57 disruptions. The answer should convey the exact disruption counts for each station without
    rounding or approximation. The answer must not conflate these as a single entity or combine their
    disruption counts, as they are separate stations with distinct disruption records.'
  notes: Ambiguous anchor — 'Washington' could match multiple stations. Oracle reveals what candidates
    exist. The system must not silently return results for the wrong station.
- id: hani_008
  question: Have any Orange Line trips been skipped recently, and which routes were most affected?
  domain: transfer_impact
  anchors:
  - Orange Line
  anchor_complexity: single
  query_mode: both
  hop_depth: deep
  temporal: implicit
  category: edge_case
  oracle_cypher: 'MATCH (d:Date)<-[:ON_DATE]-(i:Interruption:Skip)-[:AFFECTS_ROUTE]->(r:Route:Rail)

    WHERE r.route_short_name = ''O''

    WITH d ORDER BY d.date DESC LIMIT 1

    MATCH (d)<-[:ON_DATE]-(i:Interruption:Skip)-[:AFFECTS_ROUTE]->(r:Route:Rail)

    WHERE r.route_short_name = ''O''

    RETURN r.route_long_name AS route, count(DISTINCT i) AS skipped_services, d.date AS date

    '
  ground_truth: A correct answer must state that 3 Orange Line trips were skipped on April 14, 2026. The
